<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ich hatte Langeweile</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            color: #ffffff;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
            position: relative;
            overflow: hidden;
            background-color: #000;
        }

        main {
            background-color: rgba(0, 0, 0, 0.7);
            padding: 20px;
            max-width: 90%;
            width: 100%;
            box-sizing: border-box;
            border-radius: 10px;
            z-index: 1;
        }

        h2 {
            margin-bottom: 10px;
            font-size: 24px;
            color: #007bff;
        }

        p {
            margin-top: 0;
            font-size: 18px;
        }
        .randomButton {
            position: absolute;
            top: 20px;
            right: 20px;
            background-color: #007bff; 
            color: #ffffff; 
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.3s; 
            box-shadow: 0 4px 8px rgba(0, 123, 255, 0.3); 
        }

        .randomButton:hover {
            background-color: #0056b3; 
            transform: scale(1.05); 
        }

        
        .muteButton {
            position: absolute;
            bottom: 20px;
            right: 20px;
            background-color: #ff0000;
            color: #ffffff; 
            padding: 10px 15px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            font-weight: bold;
            transition: background-color 0.3s, transform 0.3s;
            box-shadow: 0 4px 8px rgba(255, 0, 0, 0.3); 
        }

        .muteButton:hover {
            background-color: #cc0000; 
            transform: scale(1.05); 
        }

        @media (max-width: 600px) {
            body {
                height: auto;
                align-items: flex-start;
                padding-top: 20px;
            }
            
            h2 {
                font-size: 22px;
            }

            p {
                font-size: 16px;
            }
        }

       
        #galaxy {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: radial-gradient(circle, rgba(8,10,38,1) 0%, rgba(2,2,34,1) 100%);
            z-index: 0;
            overflow: hidden;
        }

        
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkling 2s infinite ease-in-out alternate, moveStars 20s linear infinite;
        }

        @keyframes twinkling {
            0% { opacity: 0.5; }
            100% { opacity: 1; }
        }

        @keyframes moveStars {
            from { transform: translateY(0); }
            to { transform: translateY(-100vh); }
        }
    </style>
</head>
<body>
    <div id="galaxy"></div>

    
    <button class="randomButton" onclick="openRandomLink()">Random</button>

   
    <button class="muteButton" id="muteButton" onclick="toggleMute()">Stumm</button>

    <main>
        <h2>Sinn der Website</h2>
        <p>Ich hatte Langeweile</p>
        <p>The FitnessGram™ Pacer Test is a multistage aerobic capacity test that progressively gets more difficult as it continues. The 20 meter pacer test will begin in 30 seconds. Line up at the start. The running speed starts slowly</p>
    </main>

    <script>
      
        function createStars() {
            const starCount = 150;
            const galaxy = document.getElementById("galaxy");

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement("div");
                star.classList.add("star");

                const size = Math.random() * 3 + 1 + "px";
                const top = Math.random() * 100 + "%";
                const left = Math.random() * 100 + "%";
                const delay = Math.random() * 2 + "s";
                const duration = Math.random() * 5 + 10 + "s";

                star.style.width = size;
                star.style.height = size;
                star.style.top = top;
                star.style.left = left;
                star.style.animationDelay = delay;
                star.style.animationDuration = duration;

                galaxy.appendChild(star);
            }
        }

        createStars(); 

       
        const links = [
            "https://tylerpalko.github.io/Is-My-Computer-ON/",
            "https://www.youtube.com/watch?v=a4na2opArGY",
            "https://www.youtube.com/watch?v=1rkUcw9INLI&t=7s",
            "https://www.youtube.com/watch?v=kuABN_OYoVg",
            "https://eveee00.github.io/",
        ];

        
        function openRandomLink() {
            const randomIndex = Math.floor(Math.random() * links.length);
            const randomLink = links[randomIndex];
            window.open(randomLink, "_blank");
        }

        
        let isMuted = false;
        const sounds = [
            "GLaDOS-15.wav",
            "GLaDOS-40.wav",
            "GLaDOS-11.wav",
            "GLaDOS-7.wav",
            "GLaDOS-5.wav",
            "GLaDOS-1.wav",
            "GLaDOS-4.wav",
            "GLaDOS-10.wav",
            "GLaDOS-75.wav",
            "GLaDOS-99.wav",
            "GLaDOS-104.wav",
            "GLaDOS-690046.wav",
            "GLaDOS-690047.wav",
            "GLaDOS-690055.wav",
            "GLaDOS-690128.wav",
            "GLaDOS-690138.wav",
            "GLaDOS-690150.wav",
            "GLaDOS-690161.wav",
            "GLaDOS-690189.wav",
            "GLaDOS-690195.wav",
            "GLaDOS-690196.wav",
            "GLaDOS-690197.wav",
            "GLaDOS-690201.wav",
            "GLaDOS-690218.wav",
            "GLaDOS-690225.wav",
            "GLaDOS-690230.wav",
            "GLaDOS-690244.wav",
            "GLaDOS-690252.wav",
            "GLaDOS-690260.wav",
            "GLaDOS-690276.wav",
            "GLaDOS-tts-I'll-take-it.wav",

        ];

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('muteButton').textContent = isMuted ? "Unmute" : "Stumm";
        }

        
        setInterval(() => {
            if (!isMuted) {
                const randomIndex = Math.floor(Math.random() * sounds.length);
                const audio = new Audio(sounds[randomIndex]);
                audio.play();
            }
        }, 60000); 
    </script>
</body>
</html>
